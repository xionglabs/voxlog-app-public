name: 打包 Android APK

on:
  push:
    branches: [main, master]   # 推送到 main 或 master 分支时自动触发
  workflow_dispatch:            # 也支持在 GitHub 网页上手动点击触发

jobs:
  build-apk:
    name: 构建 Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置 Java 21（Android Gradle 要求）
      - name: 配置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. 配置 Node.js
      - name: 配置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 4. 安装 pnpm
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 5. 缓存 node_modules，加速后续构建
      - name: 缓存 node_modules
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 6. 安装前端依赖
      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # 7. 构建前端（写入 dist/）
      # VITE_ 开头的变量需要在 GitHub 仓库 Settings → Secrets → Actions 里配置
      - name: 检查 Supabase Secrets
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "⚠️  警告：VITE_SUPABASE_URL 或 VITE_SUPABASE_ANON_KEY 未配置！"
            echo "   激活码功能将不可用，但 App 核心功能可正常运行。"
            echo "   如需激活码功能：请在 GitHub → Settings → Secrets → Actions 中添加两个 Secret。"
          else
            echo "✅ Supabase Secrets 已配置"
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 构建前端
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npx vite build

      # 8. 添加 Android 平台（如果 android/ 目录还不存在）
      - name: 添加 Capacitor Android 平台
        run: npx cap add android || true   # android/ 已存在时跳过，不中断构建

      # 9. 注入 Android 权限（麦克风、存储等）
      - name: 注入 Android 权限
        run: bash scripts/setup-android.sh

      # 10. 同步 dist/ 到 Android 项目
      - name: 同步 Capacitor
        run: npx cap sync android

      # 11. 给 Gradle 加执行权限
      - name: 授权 Gradle
        run: chmod +x android/gradlew

      # 12. 用 Gradle 打包 Debug APK
      - name: 打包 APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      # 13. 上传 APK 为 Artifact，在 Actions 页面可直接下载
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: voxlog-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # 保留 30 天
